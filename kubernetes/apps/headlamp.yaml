apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: headlamp
  namespace: argocd
spec:
  project: default
  source:
    chart: headlamp
    repoURL: https://kubernetes-sigs.github.io/headlamp/
    targetRevision: 0.40.0
    helm:
      releaseName: headlamp
      values: |
        config:
          oidc:
            secret:
              create: false
  destination:
    server: "https://kubernetes.default.svc"
    namespace: headlamp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
