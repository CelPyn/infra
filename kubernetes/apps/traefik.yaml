apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
spec:
  project: default
  source:
    chart: traefik
    repoURL: oci://ghcr.io/traefik/helm/traefik
    targetRevision: 39.0.6
    helm:
      releaseName: traefik
      values: |
        ports:
          web:
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
                  permanent: true
        ingressRoute:
          dashboard:
            enabled: true
        providers:
          kubernetesIngress:
            publishedService:
              enabled: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: traefik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
